# GoReleaser configuration for intropy CLI
# https://goreleaser.com/
#
# Usage:
#   goreleaser release --clean        # full release (requires GITHUB_TOKEN)
#   goreleaser release --snapshot     # test build without publishing

version: 2

project_name: intropy

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: intropy
    main: ./cmd/intropy
    binary: intropy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
      - install.sh

signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
    artifacts: all

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-rc"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.*$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?!?:.*$'
      order: 1
    - title: Other Changes
      order: 999

brews:
  - name: intropy
    repository:
      owner: intropy
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/intropy/intropy-cli"
    description: "CLI for Intropy integrations and agent skills"
    license: "MIT"
    test: |
      system "#{bin}/intropy", "version"
    install: |
      bin.install "intropy"
      output = Utils.safe_popen_read(bin/"intropy", "completion", "bash")
      (bash_completion/"intropy").write output
      output = Utils.safe_popen_read(bin/"intropy", "completion", "zsh")
      (zsh_completion/"_intropy").write output
      output = Utils.safe_popen_read(bin/"intropy", "completion", "fish")
      (fish_completion/"intropy.fish").write output
    dependencies:
      - name: cosign
        type: optional

release:
  github:
    owner: intropy
    name: intropy-cli
  draft: true
  prerelease: auto
  extra_files:
    - glob: ./install.sh
